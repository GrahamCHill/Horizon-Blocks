name: Theme CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  validate:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Run lint
        run: npm run lint

      - name: Run build
        run: npm run build

      - name: Run package
        run: npm run package

      - name: Upload packaged theme
        uses: actions/upload-artifact@v4
        with:
          name: horizon-blocks-package
          path: dist/horizon-blocks.zip
