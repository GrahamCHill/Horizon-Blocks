name: Theme CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  validate:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run lint
        run: npm run lint

      - name: Run build
        run: npm run build

      - name: Run package
        run: npm run package

      - name: Upload packaged theme
        uses: actions/upload-artifact@v4
        with:
          name: horizon-blocks-package
          path: dist/horizon-blocks.zip

      - name: Create commit release
        if: github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'master')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.sha }}
          name: Horizon Blocks build-${{ github.sha }}
          prerelease: true
          generate_release_notes: false
          body: |
            Automated build release for commit `${{ github.sha }}`.

            Included asset:
            - `dist/horizon-blocks.zip`
          files: dist/horizon-blocks.zip
